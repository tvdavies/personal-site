<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tom@portfolio</title>
    <meta
      name="description"
      content="Tom Davies — AI engineer. A personal site that thinks it's a CLI."
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="bg-canvas" aria-hidden="true"></canvas>
      <main id="terminal" class="terminal" aria-label="Terminal portfolio">
        <header class="titlebar" aria-hidden="true">
          <div class="titlebar-dots">
            <span class="dot dot-r"></span>
            <span class="dot dot-y"></span>
            <span class="dot dot-g"></span>
          </div>
          <div class="titlebar-title">tom@portfolio — -zsh — 120×40</div>
          <div class="titlebar-spacer"></div>
        </header>
        <section id="log" class="log" aria-live="polite"></section>
        <form id="prompt-form" class="prompt" autocomplete="off">
          <span class="prompt-sigil">❯</span>
          <span class="prompt-path">~</span>
          <input
            id="prompt-input"
            class="prompt-input"
            type="text"
            spellcheck="false"
            autocapitalize="off"
            autocorrect="off"
            aria-label="Ask anything about Tom"
          />
          <span class="prompt-cursor" aria-hidden="true">▍</span>
        </form>
        <footer id="statusbar" class="statusbar" aria-hidden="true">
          <span class="status-left">
            <span class="status-pill">tom-4-opus</span>
            <span class="status-sep">·</span>
            <span class="status-cwd">~/about</span>
            <span class="status-sep">·</span>
            <span class="status-branch">main ●</span>
          </span>
          <span class="status-right">
            <kbd>⏎</kbd> send
            <span class="status-sep">·</span>
            <kbd>/</kbd> commands
            <span class="status-sep">·</span>
            <kbd>?</kbd> help
          </span>
        </footer>
      </main>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
